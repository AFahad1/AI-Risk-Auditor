<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk Assessment</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── SETUP SCREEN ── -->
  <div id="setup-screen">
    <div class="setup-card">
      <div class="setup-logo">
        <span class="logo-icon">🔍</span>
        <h1>Risk Assessment</h1>
      </div>

      <div class="form-group">
        <label>Select Framework</label>
        <div class="framework-grid">
          <div class="framework-card" data-framework="SOC 2">
            <span class="fw-icon">☁️</span>
            <span class="fw-name">SOC 2</span>
            <span class="fw-desc">Trust Service Criteria</span>
          </div>
          <div class="framework-card" data-framework="ISO 27001">
            <span class="fw-icon">🔒</span>
            <span class="fw-name">ISO 27001</span>
            <span class="fw-desc">Information Security Management</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="org-name">Organisation Name <span class="required">*</span></label>
        <input type="text" id="org-name" placeholder="e.g. Acme Corp" />
      </div>


      <div class="form-group">
        <label for="assignee">Assignee Email <span class="optional">(optional)</span></label>
        <input type="email" id="assignee" placeholder="responsible@company.com" />
      </div>

      <div id="setup-error" class="error-msg" style="display:none"></div>

      <button id="start-btn" class="btn-primary">Begin Assessment →</button>
    </div>
  </div>

  <!-- ── CHAT SCREEN ── -->
  <div id="chat-screen" style="display:none">

    <div class="chat-topbar">
      <div class="topbar-meta">
        <span class="meta-label">Framework</span>
        <span id="sb-framework" class="meta-value">—</span>
        <span class="topbar-sep">·</span>
        <span class="meta-label">Organisation</span>
        <span id="sb-org" class="meta-value">—</span>
      </div>
      <button id="download-btn" class="btn-download" style="display:none" onclick="downloadCSV()">
        ⬇ Download CSV Report
      </button>
    </div>

    <div class="chat-wrapper">

      <div class="chat-progress">
        <div class="progress-header">
          <span>Progress</span>
          <span id="progress-text">0 / 0</span>
        </div>
        <div class="progress-track">
          <div id="progress-bar" class="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <main class="chat-main">
        <div id="messages" class="messages-area"></div>

        <div class="input-area">
          <textarea
            id="answer-input"
            placeholder="Type your answer here… (Press Enter to send, Shift+Enter for new line)"
            rows="3"
            disabled
          ></textarea>
          <button id="send-btn" class="btn-send" disabled onclick="submitAnswer()">Send</button>
        </div>
      </main>

    </div>

  </div>

  <script src="/static/script.js"></script>
</body>
</html>
