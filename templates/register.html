<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Risk Assessment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="setup-screen">
    <div class="form-panel" style="max-width:420px;width:100%;border-radius:20px;border:1px solid rgba(251,146,60,0.18);margin:24px;justify-content:flex-start;">

      <div class="form-panel-header">
        <div class="form-logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <span class="form-panel-title">Create Account</span>
      </div>

      {% if error %}
        <div class="error-msg" style="display:block;margin-bottom:18px;">{{ error }}</div>
      {% endif %}

      <form method="POST" autocomplete="on">
        <div class="form-group">
          <label class="field-label" for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="field-label" for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label class="field-label" for="confirm">Confirm Password</label>
          <input type="password" id="confirm" name="confirm" placeholder="••••••••" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn-primary">
          <span class="btn-inner">
            Create Account
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </span>
        </button>
      </form>

      <div class="form-footer">
        Already have an account?
        <a href="/login" style="color:#f97316;text-decoration:none;font-weight:600;">Sign In</a>
      </div>
    </div>
  </div>
</body>
</html>
